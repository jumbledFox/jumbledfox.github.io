<html>
    <head>
        <link id="favicon" rel="icon" type="{!favicon_type}" href="{!favicon_href}">
        <title>jumbledFox | {!title}</title>
        <meta name="description" content="{!description}">
        <meta name="author"      content="{!author}">
        <style>:root { --grad: url("{!background}"); }</style>
        <link rel="stylesheet" href="/res/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="darkreader-lock">
    </head>
    <body>
        <div id="background"></div>
        <div id="grid"></div>
        <div id="content">
            <h1 style="margin-top: 0; padding-top: .6em">jumbledFox's website.</h1>
            <div id="nav">
                <script>
                    // guhh... i don't like js :P
                    let nav = document.getElementById("nav");
                    
                    // let path = "/swag_weaselz/blah";
                    let path = window.location.pathname;
                    if (path.endsWith("/index.html")) {
                        path = path.slice(0, -11);
                    }
                    let split_path = path.split('/').filter(p => p != "");
                    split_path.splice(0, 0, "");

                    for (let i = 0; i < split_path.length; i++) {
                        let button = document.createElement("a");
                        button.href = split_path.slice(0, i+1).join("/");

                        let edge_l = document.createElement("span");
                        let edge_r = document.createElement("span");
                        edge_l.textContent = "│││";
                        edge_r.textContent = "│││";
                        edge_l.classList.add("edge");
                        edge_r.classList.add("edge");
                        
                        let text = document.createElement("span");
                        text.textContent = split_path[i];
                        if (i === 0) {
                            text.textContent = "jumbledfox.github.io";
                            button.href = "/";
                        } else if (i === split_path.length-1 && "{!title}" != "404") {
                            // meh.. kinda works
                            text.textContent = "{!title}";
                        }
                        
                        button.appendChild(edge_l);
                        button.appendChild(text);
                        button.appendChild(edge_r);
                        nav.appendChild(button);
                    }
                </script>
            </div>
            <base href="{!!base}">
            {!!content}
        </div>
        <div id="crt-layer"></div>

    </body>
</html>
